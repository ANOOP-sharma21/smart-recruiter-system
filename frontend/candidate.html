<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Recruiter - Candidate Form</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/a2d9d6cfd3.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0f2027,#2c5364,#f8cdda);
}

/* CARD */
.card{
    width:550px;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(25px);
    box-shadow:0 15px 50px rgba(0,0,0,0.5);
    color:white;
}

h2{text-align:center;margin-bottom:5px;}
.subtitle{text-align:center;font-size:13px;margin-bottom:25px;opacity:0.8;}

.input-box{
    position:relative;
    margin-bottom:18px;
}

.input-box input,
.input-box textarea,
.input-box select{
    width:100%;
    padding:12px 40px;
    border-radius:12px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.2);
    color:white;
    font-size:14px;
}

/* FIX DROPDOWN */
.input-box select option{
    color:black;
    background:white;
}

.input-box textarea{
    height:90px;
    resize:none;
}

/* LABEL */
.input-box label{
    position:absolute;
    top:12px;
    left:40px;
    font-size:13px;
    color:#ddd;
    transition:0.3s;
}

.input-box input:focus ~ label,
.input-box input:not(:placeholder-shown) ~ label,
.input-box textarea:focus ~ label,
.input-box textarea:not(:placeholder-shown) ~ label,
.input-box select:focus ~ label,
.input-box select:valid ~ label{
    top:-8px;
    left:35px;
    font-size:11px;
    color:#00eaff;
}

/* ICON */
.input-box i{
    position:absolute;
    top:12px;
    left:12px;
    color:#00eaff;
}

/* ROW */
.row{
    display:flex;
    gap:10px;
}

.row .input-box{
    flex:1;
}

/* FILE UPLOAD */
.file-upload{
    position:relative;
    border:2px dashed rgba(255,255,255,0.4);
    border-radius:15px;
    text-align:center;
    padding:20px;
    cursor:pointer;
    background:rgba(255,255,255,0.1);
    margin-bottom:15px;
}

.file-upload:hover{
    border-color:#00eaff;
}

.file-upload input{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    opacity:0;
}

#fileName{
    margin-top:10px;
    font-size:12px;
    color:#00ffcc;
}

/* BUTTON */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,#00eaff,#0072ff);
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}
.candi{
    color:white;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="card">
    <h2>Candidate Profile</h2>
    <div class="subtitle">Smart Recruiter System</div>

    <form id="candidateForm">

        <div class="input-box">
            <i class="fas fa-user"></i>
            <input type="text" id="name" required placeholder=" ">
            <label>Full Name</label>
        </div>

        <div class="row">
            <div class="input-box">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" required placeholder=" ">
                <label>Email</label>
            </div>

            <div class="input-box">
                <i class="fas fa-phone"></i>
                <input type="tel" id="phone" required placeholder=" ">
                <label>Phone</label>
            </div>
        </div>

        <div class="input-box">
            <i class="fas fa-code"></i>
            <input type="text" id="skills" required placeholder=" ">
            <label>Skills</label>
        </div>

        <div class="row">
            <div class="input-box">
                <i class="fas fa-briefcase"></i>
                <input type="number" id="experience" required placeholder=" ">
                <label>Experience</label>
            </div>

            <div class="input-box">
                <i class="fas fa-graduation-cap"></i>
                <select id="education" required>
                    <option value="" disabled selected>Select Education</option>
                    <option>B.Tech</option>
                    <option>BCA</option>
                    <option>MCA</option>
                    <option>M.Tech</option>
                    <option>MBA</option>
                    <option>BBA</option>
                </select>
                <label>Education</label>
            </div>
        </div>

        <!-- FILE UPLOAD -->
        <div class="file-upload">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>Upload Resume</p>
            <input type="file" id="fileInput" accept=".pdf,.doc,.docx" required>
            <div id="fileName">No file selected</div>
        </div>

        <div class="input-box">
            <i class="fas fa-user-edit"></i>
            <textarea id="about" required placeholder=" "></textarea>
            <label>About You</label>
        </div>

        <button type="submit"><a class="candi" href="candidate.html">Submit Profile</a></button>

    </form>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const fileName = document.getElementById("fileName");

let selectedFile = null;

// SHOW FILE NAME
fileInput.addEventListener("change", function(){
    if(this.files.length > 0){
        selectedFile = this.files[0];
        fileName.innerText = "Selected: " + selectedFile.name;
    }
});

// FORM SUBMIT
document.getElementById("candidateForm").addEventListener("submit", function(e){
    e.preventDefault();

    if(!selectedFile){
        alert("Please upload resume!");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(){

        let candidate = {
            id: Date.now(),
            name: name.value,
            email: email.value,
            phone: phone.value,
            skills: skills.value.split(",").map(s=>s.trim().toUpperCase()),
            experience: experience.value,
            education: education.value,
            about: about.value,
            resume: reader.result,
            status: "Pending"
        };

        let db = JSON.parse(localStorage.getItem("candidates")) || [];
        db.push(candidate);

        localStorage.setItem("candidates", JSON.stringify(db));

        alert("Profile Submitted Successfully ✅");

        window.location.href = "dashboard.html";
    };

    reader.readAsDataURL(selectedFile);
});
</script>

</body>
</html>
