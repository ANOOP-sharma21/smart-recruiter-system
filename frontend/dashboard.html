<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Recruiter Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  min-height:100vh;
  background: radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.12), transparent 35%),
              radial-gradient(circle at 80% 0%, rgba(168, 85, 247, 0.16), transparent 30%),
              linear-gradient(-45deg, #03040a, #090e24, #111938, #1b1140);
  background-size: cover, cover, 320% 320%;
  animation: premiumFlow 18s ease infinite;
  color:white;
  position:relative;
  overflow-x:hidden;
}

@keyframes premiumFlow{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

header{
  padding:22px 15px 12px;
  text-align:center;
  position:relative;
  z-index:2;
}

header h2{
  font-size:30px;
  letter-spacing: .8px;
  background: linear-gradient(90deg, #f8fafc, #dbeafe, #fde68a);
  background-clip:text;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow: 0 6px 25px rgba(0,0,0,.35);
}

.stats{
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
  margin:14px auto 6px;
  position:relative;
  z-index:2;
}

.stat-card{
  min-width:140px;
  padding:10px 14px;
  border-radius:12px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.16);
  backdrop-filter: blur(8px);
  box-shadow: 0 12px 28px rgba(8, 10, 35, .35);
}

.stat-card small{
  display:block;
  color:#dbeafe;
  font-size:12px;
}

.stat-card b{
  font-size:20px;
  color:#fde68a;
}

table{
  width:95%;
  margin:20px auto;
  background: rgba(255,255,255,.1);
  color:#f8fafc;
  border-radius:14px;
  border-collapse:separate;
  border-spacing:0;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
  backdrop-filter: blur(12px);
  box-shadow: 0 22px 55px rgba(5, 8, 25, .55);
  position:relative;
  z-index:2;
  transform-style: preserve-3d;
  transition: transform .2s ease, box-shadow .2s ease;
}

th{
  background: linear-gradient(90deg, rgba(37,99,235,.95), rgba(124,58,237,.95));
  color:white;
  text-transform: uppercase;
  letter-spacing: .5px;
  font-size: 12px;
}

th,td{
  padding:12px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,.12);
}

tbody tr{
  transition:.25s ease;
}

tbody tr:hover{
  background: rgba(255,255,255,.08);
}

.skill-tag{
  background: linear-gradient(90deg,#2563eb,#7c3aed);
  color:white;
  padding:4px 8px;
  border-radius:999px;
  margin:2px;
  display:inline-block;
  box-shadow:0 6px 14px rgba(30,64,175,.35);
}

.btn{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{transform:scale(1.05);}

.select{background:#00c853;}
.reject{background:#ff3d00;}
.delete{background:#444;}
.view{background:#0072ff;}

.bg-blob{
  position:fixed;
  width:280px;
  height:280px;
  border-radius:50%;
  filter: blur(70px);
  opacity:.35;
  pointer-events:none;
  z-index:0;
}

.blob-1{
  left:-90px;
  top:-60px;
  background:#3b82f6;
  animation: floatBlob 15s ease-in-out infinite;
}

.blob-2{
  right:-80px;
  bottom:-90px;
  background:#9333ea;
  animation: floatBlob 18s ease-in-out infinite reverse;
}

.sparkle{
  position:fixed;
  width:9px;
  height:9px;
  border-radius:50%;
  background: radial-gradient(circle, #ffffff 0%, rgba(255,255,255,0) 70%);
  pointer-events:none;
  z-index:1;
  animation: rise 10s linear forwards;
}

.fade-in{
  animation: rowIn .5s ease forwards;
  opacity:0;
}

@keyframes floatBlob{
  0%,100%{transform:translate(0,0);}
  50%{transform:translate(24px,-20px);}
}

@keyframes rise{
  0%{transform:translateY(0) scale(.4);opacity:0;}
  15%{opacity:.6;}
  100%{transform:translateY(-120px) scale(1.2);opacity:0;}
}

@keyframes rowIn{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>
<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>

<header>
<h2 id="dashboardTitle">Smart Recruiter Dashboard</h2>
</header>

<section class="stats">
<div class="stat-card">
  <small>Total Candidates</small>
  <b id="totalCount">0</b>
</div>
<div class="stat-card">
  <small>Selected</small>
  <b id="selectedCount">0</b>
</div>
<div class="stat-card">
  <small>Rejected</small>
  <b id="rejectedCount">0</b>
</div>
</section>

<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Skills</th>
<th>Experience</th>
<th>Education</th>
<th>Match %</th>
<th>Resume</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<script>

// INIT DUMMY DATA
function initData(){
if(localStorage.getItem("candidates")) return;

let data = [
{
id:1,
name:"Rahul",
email:"rahul@gmail.com",
phone:"9999999999",
skills:["HTML","CSS","JavaScript"],
experience:2,
education:"B.Tech",
resume:"#",
status:"Pending"
},
{
id:2,
name:"Priya",
email:"priya@gmail.com",
phone:"8888888888",
skills:["HTML","CSS","React","JavaScript"],
experience:3,
education:"BCA",
resume:"#",
status:"Pending"
}
];

localStorage.setItem("candidates", JSON.stringify(data));
}

// DATABASE
function getDB(){
  return JSON.parse(localStorage.getItem("candidates")) || [];
}

function saveDB(data){
  localStorage.setItem("candidates", JSON.stringify(data));
}

// MATCH FUNCTION (Skills + Experience)
function calculateMatch(candidateSkills, experience){

let requiredSkills = ["html","css","javascript","react","nodejs","python","java"];
let requiredExperience = 3;

// normalize skills
let normalized = candidateSkills.map(s => s.toLowerCase().trim());

// SKILL SCORE
let skillMatch = normalized.filter(skill =>
  requiredSkills.includes(skill)
).length;

let skillPercent = (skillMatch / requiredSkills.length) * 100;

// EXPERIENCE SCORE
let expPercent = (experience / requiredExperience) * 100;
if(expPercent > 100) expPercent = 100;

// FINAL SCORE
let finalScore = (skillPercent * 0.7) + (expPercent * 0.3);

return Math.round(finalScore);
}

// EMAILS
function sendSelectionMail(email, name){
let subject = "Job Selection Confirmation";
let body = `Dear ${name},

Congratulations! 🎉 You are selected.

HR Team`;

window.location.href =
`mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

function sendRejectionMail(email, name){
let subject = "Application Update";
let body = `Dear ${name},

Sorry, you are not selected.

Regards,
HR`;

window.location.href =
`mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

// ACTIONS
function selectCandidate(id){
let db = getDB().map(c=>{
if(c.id === id){
c.status = "Selected";
sendSelectionMail(c.email, c.name);
}
return c;
});
saveDB(db);
render();
}

function rejectCandidate(id){
let db = getDB().map(c=>{
if(c.id === id){
c.status = "Rejected";
sendRejectionMail(c.email, c.name);
}
return c;
});
saveDB(db);
render();
}

function deleteCandidate(id){
let db = getDB().filter(c=>c.id !== id);
saveDB(db);
render();
}

// RENDER
function render(){

let db = getDB();
let table = document.getElementById("tableBody");

table.innerHTML = "";

let selected = 0;
let rejected = 0;

db.forEach(c=>{

if(c.status==="Selected") selected++;
if(c.status==="Rejected") rejected++;

// FIX skills format
let skillArray = Array.isArray(c.skills) 
  ? c.skills 
  : c.skills.split(",");

// UI skills
let skills = skillArray.map(s=>`<span class="skill-tag">${s}</span>`).join("");

// MATCH
let match = calculateMatch(skillArray, c.experience);

// COLOR
let color = match >= 70 ? "green" : match >= 40 ? "orange" : "red";

table.innerHTML += `
<tr>
<td>${c.name}</td>
<td>${c.email}</td>
<td>${c.phone}</td>
<td>${skills}</td>
<td>${c.experience} yrs</td>
<td>${c.education}</td>
<td style="color:${color}; font-weight:bold">${match}%</td>
<td><a href="${c.resume}" target="_blank" class="btn view">View</a></td>
<td>${c.status}</td>

<td>
<button class="btn select" onclick="selectCandidate(${c.id})">Select</button>
<button class="btn reject" onclick="rejectCandidate(${c.id})">Reject</button>
<button class="btn delete" onclick="deleteCandidate(${c.id})">Delete</button>
</td>
</tr>
`;
});

animateRows();

// CARDS
animateValue("totalCount", db.length);
animateValue("selectedCount", selected);
animateValue("rejectedCount", rejected);

}

function animateRows(){
const rows = document.querySelectorAll("#tableBody tr");
rows.forEach((row, i)=>{
  row.classList.add("fade-in");
  row.style.animationDelay = `${i * 70}ms`;
});
}

function animateValue(id, target){
const el = document.getElementById(id);
const start = Number(el.textContent) || 0;
const duration = 700;
const startTime = performance.now();

function step(now){
  const progress = Math.min((now - startTime) / duration, 1);
  el.textContent = Math.floor(start + (target - start) * progress);
  if(progress < 1) requestAnimationFrame(step);
}
requestAnimationFrame(step);
}

function startSparkles(){
setInterval(()=>{
  const dot = document.createElement("span");
  dot.className = "sparkle";
  dot.style.left = Math.random() * window.innerWidth + "px";
  dot.style.top = Math.random() * window.innerHeight + "px";
  document.body.appendChild(dot);
  setTimeout(()=>dot.remove(), 10000);
}, 420);
}

function typeTitle(){
const title = document.getElementById("dashboardTitle");
const text = "Smart Recruiter Dashboard";
let i = 0;
title.textContent = "";
const timer = setInterval(()=>{
  title.textContent += text.charAt(i);
  i++;
  if(i >= text.length) clearInterval(timer);
}, 55);
}

function enableTableTilt(){
const table = document.querySelector("table");
table.addEventListener("mousemove", (e)=>{
  const rect = table.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const rx = ((y / rect.height) - 0.5) * -3;
  const ry = ((x / rect.width) - 0.5) * 4;
  table.style.transform = `perspective(900px) rotateX(${rx}deg) rotateY(${ry}deg)`;
  table.style.boxShadow = "0 30px 75px rgba(5, 8, 25, .65)";
});

table.addEventListener("mouseleave", ()=>{
  table.style.transform = "perspective(900px) rotateX(0deg) rotateY(0deg)";
  table.style.boxShadow = "0 22px 55px rgba(5, 8, 25, .55)";
});
}

// INIT + LOAD
initData();
render();
typeTitle();
startSparkles();
enableTableTilt();

</script>

</body>
</html>
