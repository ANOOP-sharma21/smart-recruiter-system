<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Form</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/a2d9d6cfd3.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0f2027,#2c5364,#f8cdda);
}

.card{
    width:550px;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(25px);
    color:white;
}

.input-box{position:relative;margin-bottom:18px;}

.input-box input,
.input-box textarea,
.input-box select{
    width:100%;
    padding:12px 40px;
    border-radius:12px;
    border:none;
    background:rgba(255,255,255,0.2);
    color:white;
}

.input-box select option{
    color:black;
}

.input-box label{
    position:absolute;
    top:12px;
    left:40px;
    color:#ddd;
    transition:0.3s;
}

.input-box input:focus~label,
.input-box input:not(:placeholder-shown)~label,
.input-box textarea:focus~label,
.input-box textarea:not(:placeholder-shown)~label,
.input-box select:focus~label,
.input-box select:valid~label{
    top:-8px;
    font-size:11px;
    color:#00eaff;
}

.input-box i{
    position:absolute;
    top:12px;
    left:12px;
    color:#00eaff;
}

.row{display:flex;gap:10px;}

.file-upload{
    border:2px dashed rgba(255,255,255,0.4);
    padding:20px;
    text-align:center;
    position:relative;
    margin-bottom:15px;
}

.file-upload input{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
}
.button{
    color:white;
    background:#0072ff;
    text-decoration-color:white;
}

#fileName{font-size:12px;color:#00ffcc;}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#0072ff;
    color:white;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="card">
<h2>Candidate Form</h2>

<form id="candidateForm">

<div class="input-box">
<i class="fas fa-user"></i>
<input type="text" id="name" required placeholder=" ">
<label>Name</label>
</div>

<div class="row">
<div class="input-box">
<i class="fas fa-envelope"></i>
<input type="email" id="email" required placeholder=" ">
<label>Email</label>
</div>

<div class="input-box">
<i class="fas fa-phone"></i>
<input type="tel" id="phone" required placeholder=" ">
<label>Phone</label>
</div>
</div>

<div class="input-box">
<i class="fas fa-code"></i>
<input type="text" id="skills" required placeholder=" ">
<label>Skills</label>
</div>

<div class="row">
<div class="input-box">
<i class="fas fa-briefcase"></i>
<input type="number" id="experience" required placeholder=" ">
<label>Experience</label>
</div>

<div class="input-box">
<i class="fas fa-graduation-cap"></i>
<select id="education" required>
<option value="" disabled selected>Select</option>
<option>B.Tech</option>
<option>BCA</option>
<option>MCA</option>
<option>M.Tech</option>
<option>MBA</option>
<option>BBA</option>
</select>
<label>Education</label>
</div>
</div>

<div class="file-upload">
Upload Resume
<input type="file" id="fileInput" >
<div id="fileName">No file selected</div>
</div>

<div class="input-box">
<textarea id="about" required placeholder=" "></textarea>
<label>About</label>
</div>

<button type="submit" class="button">Submit</button>

</form>
</div>

<script>

// FILE NAME SHOW
const fileInput = document.getElementById("fileInput");
const fileName = document.getElementById("fileName");

fileInput.addEventListener("change", function(){
    if(this.files.length > 0){
        fileName.innerText = this.files[0].name;
    }
});

// SUBMIT + REDIRECT
document.getElementById("candidateForm").addEventListener("submit", function(e){

    e.preventDefault();

    const file = fileInput.files[0];

    if(!file){
        alert("Upload resume!");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(){

        const candidate = {
            id: Date.now(),
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            skills: document.getElementById("skills").value.split(",").map(s=>s.trim()),
            experience: document.getElementById("experience").value,
            education: document.getElementById("education").value,
            about: document.getElementById("about").value,
            resume: reader.result,
            status:"Pending"
        };

        let db = JSON.parse(localStorage.getItem("candidates")) || [];
        db.push(candidate);

        localStorage.setItem("candidates", JSON.stringify(db));

        alert("Submitted Successfully ✅");

        // ✅ REDIRECT
        window.location.href = "candidate.html";
    };

    reader.readAsDataURL(file);
});
</script>

</body>
</html>
