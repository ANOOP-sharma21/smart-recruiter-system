<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Recruiter - Candidate Form</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a2d9d6cfd3.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /*  BACKGROUND ANIMATION */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #0f2027, #2c5364, #f8cdda, #1d2671);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /*  CARD */
        .card {
            width: 550px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px);
            box-shadow: 0 15px 60px rgba(0, 0, 0, 0.6);
            color: white;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            margin-bottom: 25px;
            opacity: 0.8;
        }

        .input-box {
            position: relative;
            margin-bottom: 18px;
        }

        /* INPUTS */
        .input-box input,
        .input-box textarea,
        .input-box select {
            width: 100%;
            padding: 14px 45px;
            border-radius: 12px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }

        .input-box input:focus,
        .input-box textarea:focus,
        .input-box select:focus {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 10px #00eaff;
        }

        /* SELECT FIX */
        .input-box select option {
            color: black;
        }

        /* TEXTAREA */
        .input-box textarea {
            height: 90px;
            resize: none;
        }

        /* LABEL */
        .input-box label {
            position: absolute;
            top: 14px;
            left: 45px;
            font-size: 13px;
            color: #ddd;
            transition: 0.3s;
            pointer-events: none;
            
        }

        /* FLOAT INPUT */
        .input-box input:focus~label,
        .input-box input:not(:placeholder-shown)~label,
        .input-box textarea:focus~label,
        .input-box textarea:not(:placeholder-shown)~label {
            top: -8px;
            left: 40px;
            font-size: 11px;
            color: #00eaff;
        }

        /* FIX SELECT LABEL */
        .input-box select~label {
            top: -8px;
            left: 40px;
            font-size: 11px;
            color: #00eaff;
        }

        /* ICON */
        .input-box i {
            position: absolute;
            top: 14px;
            left: 15px;
            color: #00eaff;
        }

        /* ROW */
        .row {
            display: flex;
            gap: 10px;
        }

        /* FILE UPLOAD */
        .file-upload {
            position: relative;
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 15px;
            text-align: center;
            padding: 20px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .file-upload:hover {
            border-color: #00eaff;
            transform: scale(1.02);
        }

        .file-upload input {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
        }

        #fileName {
            margin-top: 10px;
            font-size: 12px;
            color: #00ffcc;
        }

        /*  BUTTON */
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(90deg, #00eaff, #0072ff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #00eaff;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Candidate Profile</h2>
        <div class="subtitle">Smart Recruiter System</div>

        <form id="candidateForm">

            <div class="input-box">
                <i class="fas fa-user"></i>
                <input type="text" id="name" name="name" required placeholder=" ">
                <label>Full Name</label>
            </div>

            <div class="row">
                <div class="input-box">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" name="email" required placeholder=" ">
                    <label>Email</label>
                </div>

                <div class="input-box">
                    <i class="fas fa-phone"></i>
                    <input type="tel" id="phone" name="phone" required placeholder=" ">
                    <label>Phone</label>
                </div>
            </div>

            <div class="input-box">
                <i class="fas fa-code"></i>
                <input type="text" id="skills" name="skills" required placeholder=" ">
                <label>Skills</label>
            </div>

            <div class="row">
                <div class="input-box">
                    <i class="fas fa-briefcase"></i>
                    <input type="number" id="experience" name="experience" required placeholder=" ">
                    <label>Experience</label>
                </div>

                <div class="input-box">
                    <i class="fas fa-graduation-cap"></i>
                    <select id="education" name="education" required>
                        <option value="" disabled selected>Select Education</option>
                        <option>B.Tech</option>
                        <option>BCA</option>
                        <option>MCA</option>
                        <option>M.Tech</option>
                        <option>MBA</option>
                        <option>BBA</option>
                    </select>
                    <label>Education</label>
                </div>
            </div>

            <!-- FILE -->
            <div class="file-upload">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>Upload Resume</p>
                <input type="file" id="fileInput" name="resume" required>
                <div id="fileName">No file selected</div>
            </div>

            <div class="input-box">
                <i class="fas fa-user-edit"></i>
                <textarea id="about" name="about" required placeholder=" "></textarea>
                <label>About You</label>
            </div>

            <button type="submit">Submit Profile</button>

        </form>
    </div>

    <script>
        const fileInput = document.getElementById("fileInput");
        const fileName = document.getElementById("fileName");

        // FILE NAME DISPLAY
        fileInput.addEventListener("change", function () {
            if (this.files.length > 0) {
                fileName.innerText = "Selected: " + this.files[0].name;
            }
        });

        // FORM SUBMIT
        document.getElementById("candidateForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const formData = new FormData(this);

            await fetch("http://localhost:5000/api/candidates", {
                method: "POST",
                body: formData
            });

            alert("🚀 Profile Submitted Successfully!");

            window.location.href = "dashboard.html";
        });
    </script>

</body>

</html>
