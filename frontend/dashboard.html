<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Recruiter Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<!-- HEADER -->
<header>
  <h2>Smart Recruiter System</h2>
  <button class="logout"><span>Logout</span></button>
</header>

<!-- STATS -->
<section class="cards">
  <div class="card"><i class="fa-solid fa-user-tie" style="color: rgb(22, 23, 23); font-size: 25px;"></i> Total Candidates <h2 id="total">0</h2></div>
  <div class="card"><i class="fa-solid fa-star" style="color: yellow; font-size: 25px;"></i> Top Match <h2 id="top">0%</h2></div>
  <div class="card"><i class="fa-solid fa-chart-simple" style="color: rgb(0, 0, 0); font-size: 25px;"></i> Avg Match <h2 id="avg">0%</h2></div>
</section>

<!-- ADD CANDIDATE -->
<section class="form">
  <input type="text" id="name" placeholder="Candidate Name">
  <input type="text" id="skills" placeholder="Skills (HTML, CSS, JS)">
  <button onclick="addCandidate()" class="selection">Add Candidate</button>
</section>

<!-- SEARCH -->
<section class="search">
  <input type="text" id="search" placeholder="Search by name..." onkeyup="render()">
</section>

<!-- TABLE -->
<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Skills</th>
      <th>Match %</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script src="dashboard.js"></script>
</body>
</html>
